name: Deploy web app to GitHub Pages

# Builds the SPAC Portal web app and publishes it to GitHub Pages so it can be
# opened (and "Add to Home Screen"-installed as a PWA) on iOS Safari, Android
# Chrome, or any browser — no native build required.

on:
  push:
    branches: ["**"]
    paths:
      - "spac-portal-android/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    defaults:
      run:
        working-directory: spac-portal-android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: spac-portal-android/package-lock.json

      - name: Configure Pages (enables Pages with the Actions source)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: spac-portal-android/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
