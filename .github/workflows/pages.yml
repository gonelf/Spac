name: Deploy web app to GitHub Pages

# Builds the SPAC Portal web app and publishes it to GitHub Pages so it can be
# opened (and "Add to Home Screen"-installed as a PWA) on iOS Safari, Android
# Chrome, or any browser — no native build required.

# The github-pages environment only allows deployments from the default branch,
# so only run on main (and manual dispatch). Running on feature branches just
# produced a doomed deploy that showed up as a failing check on every PR.
on:
  push:
    branches: ["main"]
    paths:
      - "spac-portal-android/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    defaults:
      run:
        working-directory: spac-portal-android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: spac-portal-android/package-lock.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # Cache the bundled model weights so we don't re-download ~0.2 GB from the
      # Hugging Face hub on every deploy. fetch-model.mjs (run via "prebuild")
      # skips files that are already present.
      - name: Cache bundled model weights
        uses: actions/cache@v4
        with:
          path: spac-portal-android/public/models
          key: llm-model-${{ hashFiles('spac-portal-android/scripts/fetch-model.mjs') }}

      - name: Install dependencies
        run: npm ci

      # Runs "prebuild" (scripts/fetch-model.mjs) to bundle the model into the
      # web build, then builds. The model is served from this site, so users
      # load it from your origin (cached after first load) instead of the hub.
      - name: Build web app
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: spac-portal-android/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
