name: Build Android APK

# Builds the SPAC Portal Capacitor app into an installable debug .apk.
# Runs on GitHub-hosted runners, which ship the Android SDK and have the
# network access to Google's Maven repo that a sandboxed dev box may lack.

on:
  push:
    branches: ["**"]
    paths:
      - "spac-portal-android/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spac-portal-android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: spac-portal-android/package-lock.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install build/platform tools
        run: |
          yes | sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" >/dev/null

      # Cache the bundled model weights so each APK build doesn't re-download
      # ~0.3 GB from the Hugging Face hub. fetch-model.mjs (run via "prebuild")
      # skips files already present.
      - name: Cache bundled model weights
        uses: actions/cache@v4
        with:
          path: spac-portal-android/public/models
          key: llm-model-${{ hashFiles('spac-portal-android/scripts/fetch-model.mjs') }}

      - name: Install web dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      # The model weights (~0.3 GB .onnx) are bundled as app assets. Android's
      # compressDebugAssets task OOMs ("Java heap space") trying to compress a
      # file that large — and compressing already-quantized weights is pointless.
      # Mark the binary model/runtime assets noCompress, and give Gradle more heap.
      - name: Configure Gradle for large bundled model assets
        run: |
          {
            echo ''
            echo 'android { androidResources { noCompress += ["onnx", "wasm", "bin", "data", "task"] } }'
          } >> android/app/build.gradle
          printf '\norg.gradle.jvmargs=-Xmx5g\n' >> android/gradle.properties

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: spac-portal-android/android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: spac-portal-debug-apk
          path: spac-portal-android/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Publish APK to a GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: SPAC Portal — latest debug APK
          body: |
            Auto-built debug APK for the SPAC Portal Android app.
            Commit: ${{ github.sha }}
            Download `app-debug.apk` below and install it on an Android device.
          files: spac-portal-android/android/app/build/outputs/apk/debug/app-debug.apk
          fail_on_unmatched_files: true
